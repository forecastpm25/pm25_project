name: PM25 Prediction

on:
  schedule:
    - cron: '0 * * * *'   # ทุก 1 ชั่วโมง
  workflow_dispatch:       # กดรันเองได้

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v3

    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: pip install -r requirements.txt

    - name: Run prediction
      run: python run_predict.py

    - name: Set Firebase key
      run: echo '${{ secrets.FIREBASE_KEY }}' > key.json