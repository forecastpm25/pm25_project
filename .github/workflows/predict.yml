name: PM2.5 Prediction

on:
  schedule:
    - cron: "0 * * * *"   # รันทุก 1 ชั่วโมง
  workflow_dispatch:      # กด run เองได้

jobs:
  predict:
    runs-on: ubuntu-latest

    steps:
    - name: 📥 Checkout repo
      uses: actions/checkout@v4

    - name: 🐍 Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: 📦 Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: 🔑 Create Firebase key
      run: |
        echo '${{ secrets.FIREBASE_KEY }}' > serviceAccountKey.json

    - name: 🚀 Run prediction
      run: python run_predict.py