name: Fetch PM2.5

on:
  workflow_dispatch:
  schedule:
    - cron: "*/15 * * * *"   # ทุก 1 ชั่วโมง

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      # 1. ดึงโค้ด
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. ใช้ Python 3.11
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # 3. ติดตั้ง dependencies
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # 4. สร้าง Firebase key จาก base64
      - name: Create Firebase key
        run: |
          echo "${{ secrets.FIREBASE_KEY_BASE64 }}" | base64 --decode > serviceAccountKey.json

      # 5. เช็คว่าไฟล์ถูกสร้าง (optional)
      - name: Check key file
        run: |
          echo "File size:"
          wc -c serviceAccountKey.json

      # 6. รันโปรแกรม
      - name: Run script
        run: |
          python main.py