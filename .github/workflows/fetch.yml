name: Fetch PM2.5

on:
  workflow_dispatch:
  schedule:
    - cron: "0 * * * *"   # ทุก 1 ชั่วโมง

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      # 1. ดึงโค้ดจาก repo
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. ใช้ Python 3.11
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # 3. ติดตั้ง dependencies
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # 4. สร้างไฟล์ Firebase key (สำคัญสุด)
      - name: Create Firebase key
        run: |
          cat <<EOF > serviceAccountKey.json
${{ secrets.FIREBASE_KEY }}
EOF

      # 5. (Optional) เช็คว่าไฟล์ถูกสร้าง
      - name: Check key file
        run: |
          echo "File size:"
          wc -c serviceAccountKey.json

      # 6. รัน Python
      - name: Run script
        run: |
          python main.py