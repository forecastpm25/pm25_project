name: Fetch PM2.5 (DEBUG)

on:
  workflow_dispatch:
  schedule:
    - cron: "0 * * * *"

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      # 1. ดึงโค้ด
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. ติดตั้ง Python
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # 3. ติดตั้งไลบรารี
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      # 4. DEBUG: สร้างและแสดง Firebase key
      - name: Create Firebase key (DEBUG)
        run: |
          echo '${{ secrets.FIREBASE_KEY }}' > serviceAccountKey.json
          echo "====== DEBUG: FILE SIZE ======"
          wc -c serviceAccountKey.json
          echo "====== DEBUG: FILE CONTENT ======"
          cat serviceAccountKey.json

      # 5. รันโปรแกรม
      - name: Run script
        run: |
          python main.py