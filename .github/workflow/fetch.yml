name: Fetch PM2.5

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - run: pip install -r requirements.txt

      - name: Create key
        run: |
          printf "%s" "${{ secrets.FIREBASE_KEY }}" > serviceAccountKey.json

      - run: python main.py